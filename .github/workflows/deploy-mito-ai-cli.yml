name: Deploy - Mito AI CLI
on:
  push:
    branches:
      - dev
      - main
    paths:
      - 'mito-ai-cli/**'
      - 'deployment/**'
      - '.github/workflows/deploy-mito-ai-cli.yml'

jobs:
  deploy-mito-ai-cli:
    name: Deploy mito-ai-cli
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: [3.11]
    steps:
      - name: Extract branch name
        shell: bash
        run: echo "##[set-output name=branch;]$(echo ${GITHUB_REF#refs/heads/})"
        id: extract_branch
      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.extract_branch.outputs.branch }}
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Setup Auth for PyPi
        run: |
          echo -e "[distutils]" >> ~/.pypirc
          echo -e "index-servers =" >> ~/.pypirc
          echo -e "    pypi" >> ~/.pypirc
          echo -e "    testpypi" >> ~/.pypirc
          echo -e "[pypi]" >> ~/.pypirc
          echo -e "repository = https://upload.pypi.org/legacy/" >> ~/.pypirc
          echo -e "username = __token__" >> ~/.pypirc
          echo -e "password = ${{ secrets.PYPI_API_TOKEN }}" >> ~/.pypirc
          echo -e "" >> ~/.pypirc
          echo -e "[testpypi]" >> ~/.pypirc
          echo -e "repository = https://test.pypi.org/legacy/" >> ~/.pypirc
          echo -e "username = __token__" >> ~/.pypirc
          echo -e "password = ${{ secrets.TEST_PYPI_API_TOKEN }}" >> ~/.pypirc
      - name: Setup mito-ai-cli
        run: |
          cd mito-ai-cli
          rm -rf venv
          python3 -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e ../mito-ai-core --verbose
          python -m pip install -e ../mito-ai-python-tool-executor --verbose
          python -m pip install -e . --verbose
          python -m pip install hatchling twine
          python -m pip check
          python ../deployment/bump_pyproject_version.py mito-ai-cli ${{ steps.extract_branch.outputs.branch }}
      - name: Deploy mito-ai-cli
        run: |
          cd mito-ai-cli
          source venv/bin/activate
          python ../deployment/deploy_hatch.py ${{ steps.extract_branch.outputs.branch }}
