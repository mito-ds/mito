name: Test - Mito AI CLI

on:
  workflow_dispatch:
  push:
    branches: [ dev ]
    paths:
      - 'mito-ai-cli/**'
      - 'mito-ai-core/**'
      - 'mito-ai-python-tool-executor/**'
  pull_request:
    paths:
      - 'mito-ai-cli/**'
      - 'mito-ai-core/**'
      - 'mito-ai-python-tool-executor/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-mito-ai-cli:
    name: ${{ matrix.os }} / Py ${{ matrix.python-version }} / ${{ matrix.llm-backend }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-24.04, windows-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
        llm-backend: [mito-server, openai]
      fail-fast: false

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
        cache-dependency-path: |
          mito-ai-core/pyproject.toml
          mito-ai-python-tool-executor/pyproject.toml
          mito-ai-cli/pyproject.toml
    - name: Install dependencies
      run: |
        pip install -e ./mito-ai-core
        pip install -e ./mito-ai-python-tool-executor
        pip install -e "./mito-ai-cli[test]"
    - name: Run tests
      run: |
        cd mito-ai-cli
        pytest tests/ -v
      env:
        MITO_AI_CLI_E2E: "1"
        # mito-server: no user keys → ProviderManager uses hosted Mito completions.
        # openai: user OpenAI key only (other user keys cleared).
        OPENAI_API_KEY: ${{ matrix.llm-backend == 'openai' && secrets.OPENAI_API_KEY || '' }}
